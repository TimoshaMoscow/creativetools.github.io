<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyLayout - Конвертер раскладки клавиатуры</title>
    <meta name="description" content="Инструмент для исправления текста, набранного в неправильной раскладке">
    <meta name="keywords" content="раскладка клавиатуры, конвертер текста">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">F</div>
                <div class="logo-text">FixMyLayout</div>
            </div>
            <p class="tagline">Исправление текста в неправильной раскладке клавиатуры</p>
        </header>
        
        <div class="main-grid">
            <!-- Левая колонка - Ввод -->
            <div class="panel">
                <h2 class="panel-title">
                    <i class="fas fa-keyboard"></i>
                    Ввод текста
                </h2>
                
                <form id="converterForm">
                    <div class="form-group">
                        <label class="form-label">Текст с неправильной раскладкой</label>
                        <textarea class="form-textarea" id="inputText" placeholder="Пример: gjcnfdbk b pf,sk" rows="5">gjcnfdbk b pf,sk</textarea>
                        <div class="char-counter"><span id="charCount">15</span> символов</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Параметры конвертации</label>
                        <div class="options-grid">
                            <label class="checkbox-label">
                                <input type="checkbox" class="checkbox-input" id="option-auto" checked>
                                <span class="checkbox checked">
                                    <i class="fas fa-check"></i>
                                </span>
                                <span>Автоопределение</span>
                            </label>
                            
                            <label class="checkbox-label">
                                <input type="checkbox" class="checkbox-input" id="option-both" checked>
                                <span class="checkbox checked">
                                    <i class="fas fa-check"></i>
                                </span>
                                <span>Двусторонняя</span>
                            </label>
                            
                            <label class="checkbox-label">
                                <input type="checkbox" class="checkbox-input" id="option-preserve" checked>
                                <span class="checkbox checked">
                                    <i class="fas fa-check"></i>
                                </span>
                                <span>Сохранить спецсимволы</span>
                            </label>
                            
                            <label class="checkbox-label">
                                <input type="checkbox" class="checkbox-input" id="option-checkMeaning">
                                <span class="checkbox">
                                    <i class="fas fa-check"></i>
                                </span>
                                <span>Проверять осмысленность</span>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-magic"></i>
                        Исправить раскладку
                    </button>
                </form>
            </div>
            
            <!-- Правая колонка - Результат -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <i class="fas fa-check-circle"></i>
                        Результат
                    </h2>
                    <button class="btn btn-secondary" id="refreshBtn">
                        <i class="fas fa-redo"></i>
                        Очистить
                    </button>
                </div>
                
                <div id="emptyState" class="preview-placeholder">
                    <div class="preview-placeholder-icon">⌨️</div>
                    <p>Текст ещё не конвертирован</p>
                </div>
                
                <div id="resultContent" style="display: none;">
                    <div class="converter-display">
                        <div class="converter-value" id="convertedText"></div>
                        <div class="converter-actions">
                            <button class="btn btn-primary" id="copyBtn">
                                <i class="far fa-copy"></i>
                                Копировать
                            </button>
                            <button class="btn btn-secondary" id="speakBtn">
                                <i class="fas fa-volume-up"></i>
                                Озвучить
                            </button>
                        </div>
                    </div>
                    
                    <div class="info-panel">
                        <div class="info-card">
                            <span class="info-label">Направление</span>
                            <div class="info-value" id="directionOutput">EN → RU</div>
                        </div>
                        <div class="info-card">
                            <span class="info-label">Символов</span>
                            <div class="info-value" id="lengthOutput">15</div>
                        </div>
                        <div class="info-card">
                            <span class="info-label">Осмысленность</span>
                            <div class="info-value" id="meaningOutput">Высокая</div>
                        </div>
                    </div>
                    
                    <div class="direction-indicator">
                        <span class="direction-icon" id="directionIcon">🇷🇺</span>
                        <span>Уверенность конвертации</span>
                        <span class="direction-value" id="confidenceValue">92%</span>
                    </div>
                    <div class="direction-bar">
                        <div class="direction-fill" id="confidenceFill" style="width: 92%"></div>
                    </div>
                    
                    <!-- Примеры -->
                    <div class="templates-section">
                        <h3 class="panel-title">
                            <i class="fas fa-lightbulb"></i>
                            Примеры для тестирования
                        </h3>
                        <div class="templates-grid" id="examplesGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">Текст скопирован!</span>
    </div>

    <script>
        // Карты раскладок для конвертации
        const layoutMaps = {
            enToRu: {
                'q': 'й', 'w': 'ц', 'e': 'у', 'r': 'к', 't': 'е', 'y': 'н', 'u': 'г', 'i': 'ш', 'o': 'щ', 'p': 'з',
                '[': 'х', ']': 'ъ', 'a': 'ф', 's': 'ы', 'd': 'в', 'f': 'а', 'g': 'п', 'h': 'р', 'j': 'о', 'k': 'л',
                'l': 'д', ';': 'ж', "'": 'э', 'z': 'я', 'x': 'ч', 'c': 'с', 'v': 'м', 'b': 'и', 'n': 'т', 'm': 'ь',
                ',': 'б', '.': 'ю', '/': '.', '`': 'ё', '&': '?', '?': ',',
                
                'Q': 'Й', 'W': 'Ц', 'E': 'У', 'R': 'К', 'T': 'Е', 'Y': 'Н', 'U': 'Г', 'I': 'Ш', 'O': 'Щ', 'P': 'З',
                '{': 'Х', '}': 'Ъ', 'A': 'Ф', 'S': 'Ы', 'D': 'В', 'F': 'А', 'G': 'П', 'H': 'Р', 'J': 'О', 'K': 'Л',
                'L': 'Д', ':': 'Ж', '"': 'Э', 'Z': 'Я', 'X': 'Ч', 'C': 'С', 'V': 'М', 'B': 'И', 'N': 'Т', 'M': 'Ь',
                '<': 'Б', '>': 'Ю', '?': ',', '~': 'Ё'
            },
            ruToEn: {
                'й': 'q', 'ц': 'w', 'у': 'e', 'к': 'r', 'е': 't', 'н': 'y', 'г': 'u', 'ш': 'i', 'щ': 'o', 'з': 'p',
                'х': '[', 'ъ': ']', 'ф': 'a', 'ы': 's', 'в': 'd', 'а': 'f', 'п': 'g', 'р': 'h', 'о': 'j', 'л': 'k',
                'д': 'l', 'ж': ';', 'э': "'", 'я': 'z', 'ч': 'x', 'с': 'c', 'м': 'v', 'и': 'b', 'т': 'n', 'ь': 'm',
                'б': ',', 'ю': '.', '.': '/', 'ё': '`',
                
                'Й': 'Q', 'Ц': 'W', 'У': 'E', 'К': 'R', 'Е': 'T', 'Н': 'Y', 'Г': 'U', 'Ш': 'I', 'Щ': 'O', 'З': 'P',
                'Х': '{', 'Ъ': '}', 'Ф': 'A', 'Ы': 'S', 'В': 'D', 'А': 'F', 'П': 'G', 'Р': 'H', 'О': 'J', 'Л': 'K',
                'Д': 'L', 'Ж': ':', 'Э': '"', 'Я': 'Z', 'Ч': 'X', 'С': 'C', 'М': 'V', 'И': 'B', 'Т': 'N', 'Ь': 'M',
                'Б': '<', 'Ю': '>', 'Ё': '~'
            }
        };

        // Словарь для проверки осмысленности (русские слова)
        const russianWords = [
            'привет', 'пока', 'спасибо', 'пожалуйста', 'да', 'нет', 'хорошо', 'плохо',
            'день', 'ночь', 'утро', 'вечер', 'человек', 'дом', 'работа', 'учеба',
            'друг', 'семья', 'любовь', 'жизнь', 'время', 'место', 'город', 'страна',
            'вода', 'еда', 'воздух', 'земля', 'огонь', 'небо', 'солнце', 'луна',
            'кошка', 'собака', 'птица', 'рыба', 'дерево', 'цветок', 'трава', 'лес',
            'машина', 'дорога', 'улица', 'площадь', 'парк', 'сад', 'река', 'море',
            'книга', 'журнал', 'газета', 'телефон', 'компьютер', 'интернет', 'телевизор',
            'музыка', 'фильм', 'игра', 'спорт', 'отдых', 'путешествие', 'праздник'
        ];

        // Примеры для тестирования
        const examples = [
            { input: 'gjcnfdbk b pf,sk', output: 'поставил и забыл', direction: 'EN → RU' },
            { input: 'Ghbdtn? Dctv j ghb djphfcnf?', output: 'Привет? Что я тут написал?', direction: 'EN → RU' },
            { input: 'Rfr yfheitybt cnhf;ysq?', output: 'Как преобразовать текст?', direction: 'EN → RU' },
            { input: 'Nfr jn рифмует?', output: 'Что это значит?', direction: 'Смешанный' },
            { input: 'Ckj;tybz d yt pfdtc', output: 'Пример для проверки', direction: 'EN → RU' },
            { input: 'Lj,fdktybt vj;tt yt,gtht;tybz', output: 'Конвертация работает отлично', direction: 'EN → RU' }
        ];

        // DOM элементы
        const inputText = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const convertedText = document.getElementById('convertedText');
        const copyBtn = document.getElementById('copyBtn');
        const speakBtn = document.getElementById('speakBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const directionOutput = document.getElementById('directionOutput');
        const lengthOutput = document.getElementById('lengthOutput');
        const meaningOutput = document.getElementById('meaningOutput');
        const optionsOutput = document.getElementById('optionsOutput');
        const optionsBadge = document.getElementById('optionsBadge');
        const directionIcon = document.getElementById('directionIcon');
        const confidenceOutput = document.getElementById('confidenceOutput');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        const emptyState = document.getElementById('emptyState');
        const resultContent = document.getElementById('resultContent');
        const converterForm = document.getElementById('converterForm');
        const examplesGrid = document.getElementById('examplesGrid');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');

        // Флаги опций
        let options = {
            autoDetect: true,
            bidirectional: true,
            preserveSpecial: true,
            checkMeaning: true
        };

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            initOptions();
            setupEventListeners();
            updateCharCount();
            loadExamples();
            
            // Конвертируем пример по умолчанию
            convertText();
        });

        // Инициализация опций
        function initOptions() {
            document.getElementById('option-auto').addEventListener('change', function() {
                options.autoDetect = this.checked;
            });
            
            document.getElementById('option-both').addEventListener('change', function() {
                options.bidirectional = this.checked;
            });
            
            document.getElementById('option-preserve').addEventListener('change', function() {
                options.preserveSpecial = this.checked;
            });
            
            document.getElementById('option-checkMeaning').addEventListener('change', function() {
                options.checkMeaning = this.checked;
            });
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            // Форма
            converterForm.addEventListener('submit', handleSubmit);
            
            // Счётчик символов
            inputText.addEventListener('input', updateCharCount);
            
            // Кнопки
            copyBtn.addEventListener('click', copyText);
            speakBtn.addEventListener('click', speakText);
            refreshBtn.addEventListener('click', clearAll);
        }

        // Обновление счётчика символов
        function updateCharCount() {
            const count = inputText.value.length;
            charCount.textContent = count;
        }

        // Загрузка примеров
        function loadExamples() {
            examples.forEach(example => {
                const exampleItem = document.createElement('div');
                exampleItem.className = 'example-item';
                exampleItem.innerHTML = `
                    <div class="example-input">${example.input}</div>
                    <div class="example-output">${example.output}</div>
                `;
                
                exampleItem.addEventListener('click', () => {
                    inputText.value = example.input;
                    updateCharCount();
                    convertText();
                    showNotification(`Пример "${example.input}" загружен`, 'info');
                });
                
                examplesGrid.appendChild(exampleItem);
            });
        }

        // Обработка отправки формы
        function handleSubmit(event) {
            event.preventDefault();
            convertText();
        }

        // Основная функция конвертации
        function convertText() {
            const text = inputText.value.trim();
            
            if (!text) {
                showNotification('Введите текст для конвертации', 'error');
                return;
            }
            
            // Определяем направление конвертации
            const direction = detectDirection(text);
            
            // Конвертируем текст
            const result = convertByDirection(text, direction);
            
            // Проверяем осмысленность если включена опция
            let meaningScore = 1;
            if (options.checkMeaning) {
                meaningScore = checkTextMeaning(result);
            }
            
            // Если текст уже осмысленный (высокий score), не конвертируем
            let finalResult = result;
            let finalDirection = direction;
            let confidence = calculateConfidence(text, result, direction, meaningScore);
            
            if (options.checkMeaning && meaningScore > 0.7) {
                // Текст уже выглядит осмысленным, возможно он уже правильный
                const originalMeaningScore = checkTextMeaning(text);
                if (originalMeaningScore > meaningScore) {
                    // Оригинальный текст более осмысленный
                    finalResult = text;
                    finalDirection = 'Без изменений';
                    confidence = 95;
                    showNotification('Текст уже осмысленный, конвертация не выполнена', 'info');
                }
            }
            
            // Показываем результат
            showResult(text, finalResult, finalDirection, confidence, meaningScore);
            
            // Показываем уведомление об успехе
            if (finalResult !== text) {
                showNotification('Текст успешно сконвертирован!', 'success');
            }
        }

        // Определение направления конвертации
        function detectDirection(text) {
            if (!options.autoDetect) {
                return options.bidirectional ? 'EN → RU' : 'EN → RU';
            }
            
            const hasCyrillic = /[а-яА-ЯёЁ]/.test(text);
            const hasLatin = /[a-zA-Z]/.test(text);
            
            if (!hasCyrillic && hasLatin) {
                return 'EN → RU';
            } else if (!hasLatin && hasCyrillic) {
                return 'RU → EN';
            } else if (hasCyrillic && hasLatin) {
                // Считаем количество символов каждого типа
                const enCount = (text.match(/[a-zA-Z]/g) || []).length;
                const ruCount = (text.match(/[а-яА-ЯёЁ]/g) || []).length;
                
                if (enCount > ruCount) {
                    return 'EN → RU';
                } else {
                    return 'RU → EN';
                }
            }
            
            return 'Не определено';
        }

        // Конвертация по направлению
        function convertByDirection(text, direction) {
            let result = '';
            let map = {};
            
            if (direction === 'EN → RU') {
                map = layoutMaps.enToRu;
            } else if (direction === 'RU → EN') {
                map = layoutMaps.ruToEn;
            } else {
                // Если направление не определено, пробуем оба варианта
                const enToRuResult = convertWithMap(text, layoutMaps.enToRu);
                const ruToEnResult = convertWithMap(text, layoutMaps.ruToEn);
                
                // Выбираем результат с большей осмысленностью
                const enToRuMeaning = checkTextMeaning(enToRuResult);
                const ruToEnMeaning = checkTextMeaning(ruToEnResult);
                
                if (enToRuMeaning > ruToEnMeaning) {
                    return enToRuResult;
                } else {
                    return ruToEnResult;
                }
            }
            
            return convertWithMap(text, map);
        }

        // Конвертация с использованием карты
        function convertWithMap(text, map) {
            let result = '';
            
            for (let char of text) {
                if (options.preserveSpecial && !map[char] && !/[a-zA-Zа-яА-ЯёЁ]/.test(char)) {
                    // Сохраняем спецсимволы
                    result += char;
                } else if (map[char]) {
                    result += map[char];
                } else {
                    result += char;
                }
            }
            
            return result;
        }

        // Проверка осмысленности текста
        function checkTextMeaning(text) {
            const words = text.toLowerCase().split(/[^а-яёa-z]+/).filter(word => word.length > 2);
            
            if (words.length === 0) return 0;
            
            let meaningfulWords = 0;
            
            words.forEach(word => {
                // Проверяем русские слова
                if (russianWords.some(russianWord => word.includes(russianWord) || russianWord.includes(word))) {
                    meaningfulWords++;
                }
                // Также можно добавить проверку по словарю английских слов
            });
            
            return meaningfulWords / words.length;
        }

        // Расчет уверенности конвертации
        function calculateConfidence(original, converted, direction, meaningScore) {
            let confidence = 70; // Базовая уверенность
            
            // Увеличиваем уверенность если текст стал более осмысленным
            const originalMeaning = checkTextMeaning(original);
            if (meaningScore > originalMeaning) {
                confidence += (meaningScore - originalMeaning) * 30;
            }
            
            // Увеличиваем уверенность если направление четко определено
            if (direction !== 'Не определено' && direction !== 'Смешанный') {
                confidence += 10;
            }
            
            // Уменьшаем уверенность если много спецсимволов
            const specialChars = (original.match(/[^a-zA-Zа-яА-ЯёЁ\s]/g) || []).length;
            if (specialChars > original.length * 0.3) {
                confidence -= 15;
            }
            
            return Math.min(Math.max(Math.round(confidence), 0), 100);
        }

        // Показать результат
        function showResult(original, result, direction, confidence, meaningScore) {
            // Скрыть пустое состояние
            emptyState.style.display = 'none';
            resultContent.style.display = 'block';
            
            // Обновить данные
            convertedText.textContent = result;
            directionOutput.textContent = direction;
            lengthOutput.textContent = result.length + ' символов';
            
            // Оценка осмысленности
            let meaningText = 'Низкая';
            if (meaningScore > 0.7) meaningText = 'Высокая';
            else if (meaningScore > 0.4) meaningText = 'Средняя';
            meaningOutput.textContent = meaningText;
            
            // Параметры
            const activeOptions = [];
            if (options.autoDetect) activeOptions.push('Авто');
            if (options.bidirectional) activeOptions.push('Двусторонняя');
            if (options.preserveSpecial) activeOptions.push('Спецсимволы');
            if (options.checkMeaning) activeOptions.push('Осмысленность');
            
            optionsOutput.textContent = activeOptions.join(', ');
            optionsBadge.textContent = direction === 'Без изменений' ? 'Конвертация не требуется' : 'Коррекция выполнена';
            
            // Направление и уверенность
            directionIcon.textContent = direction.includes('EN → RU') ? '🇷🇺' : direction.includes('RU → EN') ? '🇬🇧' : '🔄';
            
            let confidenceText = 'Низкая';
            if (confidence > 80) confidenceText = 'Высокая';
            else if (confidence > 60) confidenceText = 'Средняя';
            
            confidenceOutput.textContent = confidenceText;
            confidenceValue.textContent = confidence + '%';
            confidenceFill.style.width = confidence + '%';
            
            // Цвет заполнителя в зависимости от уверенности
            if (confidence > 80) {
                confidenceFill.style.background = 'var(--success)';
            } else if (confidence > 60) {
                confidenceFill.style.background = 'var(--warning)';
            } else {
                confidenceFill.style.background = 'var(--danger)';
            }
        }

        // Копирование текста
        function copyText() {
            navigator.clipboard.writeText(convertedText.textContent).then(() => {
                const btn = copyBtn;
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-check"></i> Скопировано';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
                
                showNotification('Текст скопирован в буфер обмена!', 'success');
            });
        }

        // Озвучивание текста
        function speakText() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(convertedText.textContent);
                utterance.lang = 'ru-RU';
                utterance.rate = 1.0;
                speechSynthesis.speak(utterance);
                showNotification('Озвучивание текста...', 'info');
            } else {
                showNotification('Ваш браузер не поддерживает озвучивание текста', 'error');
            }
        }

        // Очистка всего
        function clearAll() {
            inputText.value = '';
            convertedText.textContent = '';
            emptyState.style.display = 'block';
            resultContent.style.display = 'none';
            updateCharCount();
            showNotification('Все поля очищены', 'info');
        }

        // Показать уведомление
        function showNotification(message, type) {
            notificationText.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Анимация при загрузке
        function animateElements() {
            const elements = document.querySelectorAll('.form-group, .submit-btn, .example-item');
            elements.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    el.style.transition = 'all 0.5s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, i * 100);
            });
        }

        // Запуск анимации
        setTimeout(animateElements, 100);
    </script>
</body>
</html>
