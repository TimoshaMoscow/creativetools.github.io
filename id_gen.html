<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDGen Pro - Генератор UUID, ID и хэшей</title>
    <meta name="description" content="Генератор уникальных идентификаторов">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <div class="logo-text">IDGen Pro</div>
            </div>
            <p class="tagline">Генератор уникальных идентификаторов</p>
        </header>
        
        <div class="main-grid">
            <!-- Левая панель - Настройки -->
            <div class="panel">
                <h2 class="panel-title">
                    <i class="fas fa-sliders-h"></i>
                    Настройки генерации
                </h2>
                
                <div class="button-group">
                    <button class="btn active" data-type="uuid">UUID</button>
                    <button class="btn" data-type="shortid">Короткий ID</button>
                    <button class="btn" data-type="hash">Хэш</button>
                    <button class="btn" data-type="random">Случайная</button>
                    <button class="btn" data-type="numeric">Числовой</button>
                    <button class="btn" data-type="custom">Кастомный</button>
                </div>
                
                <!-- UUID Settings -->
                <div class="setting-group" id="uuidSettings">
                    <label class="setting-label">Версия UUID</label>
                    <div class="button-group" id="uuidVersionSelector">
                        <button class="btn active" data-version="v4">v4</button>
                        <button class="btn" data-version="v1">v1</button>
                        <button class="btn" data-version="v3">v3</button>
                        <button class="btn" data-version="v5">v5</button>
                    </div>
                    
                    <label class="checkbox-label" style="margin-top: 10px;">
                        <input type="checkbox" class="checkbox-input" id="uppercaseCheckbox">
                        <span class="checkbox">
                            <i class="fas fa-check"></i>
                        </span>
                        <span>Верхний регистр</span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="hyphensCheckbox" checked>
                        <span class="checkbox checked">
                            <i class="fas fa-check"></i>
                        </span>
                        <span>Дефисы в UUID</span>
                    </label>
                </div>
                
                <!-- Остальные настройки -->
                
                <div class="setting-group">
                    <label class="setting-label">Количество ID</label>
                    <div class="slider-container">
                        <input type="range" min="1" max="50" value="1" class="slider" id="batchCountSlider">
                        <span class="slider-value" id="batchCountValue">1</span>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" id="generateBtn">
                        <i class="fas fa-bolt"></i>
                        Сгенерировать
                    </button>
                    <button class="btn btn-secondary" id="batchBtn">
                        <i class="fas fa-sync"></i>
                        Пакет
                    </button>
                </div>
            </div>
            
            <!-- Правая панель - Результаты -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <i class="fas fa-barcode"></i>
                        Результаты
                    </h2>
                    <span class="slider-value" id="resultsCount">0 ID</span>
                </div>
                
                <div class="info-panel" id="infoPanel" style="display: none;">
                    <div class="info-card">
                        <span class="info-label">Тип</span>
                        <div class="info-value" id="infoType">-</div>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Длина</span>
                        <div class="info-value" id="infoLength">-</div>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Время</span>
                        <div class="info-value" id="infoTime">-</div>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Уникальность</span>
                        <div class="info-value" id="infoUnique">-</div>
                    </div>
                </div>
                
                <div class="preview-container" style="min-height: 100px; background: linear-gradient(135deg, var(--primary-light), var(--secondary));">
                    <div class="result-text" id="mainResult" style="display: none;"></div>
                    <div class="preview-placeholder" id="resultPlaceholder">
                        <i class="fas fa-barcode"></i>
                        <p>Настройте параметры и сгенерируйте ID</p>
                    </div>
                </div>
                
                <div class="results-list" id="resultsList" style="display: none;"></div>
                
                <div class="export-section">
                    <div class="export-buttons">
                        <button class="btn btn-secondary" id="copyBtn">
                            <i class="far fa-copy"></i>
                            Копировать
                        </button>
                        <button class="btn btn-secondary" id="copyAllBtn">
                            <i class="fas fa-copy"></i>
                            Копировать все
                        </button>
                        <button class="btn btn-secondary" id="downloadBtn">
                            <i class="fas fa-download"></i>
                            Скачать
                        </button>
                        <button class="btn btn-primary" id="saveBtn">
                            <i class="far fa-save"></i>
                            Сохранить
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- История -->
        <div class="history-section">
            <div class="history-header">
                <h2 class="panel-title">
                    <i class="fas fa-history"></i>
                    История генераций
                </h2>
                <button class="btn btn-secondary" id="clearHistoryBtn">
                    <i class="fas fa-trash"></i>
                    Очистить
                </button>
            </div>
            <div class="history-grid" id="historyList"></div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">ID сгенерирован!</span>
    </div>

    <script>
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
        });

        // Основные переменные
        let currentType = 'uuid';
        let generatedIDs = [];
        let generationHistory = JSON.parse(localStorage.getItem('idgen_history')) || [];
        let uuidVersion = 'v4';
        let hashType = 'md5';
        let randomType = 'alphanumeric';

        // DOM элементы
        const elements = {
            // Type buttons
            typeButtons: document.querySelectorAll('.type-btn'),
            
            // Settings sections
            uuidSettings: document.getElementById('uuidSettings'),
            shortidSettings: document.getElementById('shortidSettings'),
            hashSettings: document.getElementById('hashSettings'),
            randomSettings: document.getElementById('randomSettings'),
            numericSettings: document.getElementById('numericSettings'),
            customSettings: document.getElementById('customSettings'),
            
            // UUID
            uuidVersionSelector: document.getElementById('uuidVersionSelector'),
            uppercaseCheckbox: document.getElementById('uppercaseCheckbox'),
            hyphensCheckbox: document.getElementById('hyphensCheckbox'),
            
            // Short ID
            shortidLengthSlider: document.getElementById('shortidLengthSlider'),
            shortidLengthValue: document.getElementById('shortidLengthValue'),
            charsLowerCheckbox: document.getElementById('charsLowerCheckbox'),
            charsUpperCheckbox: document.getElementById('charsUpperCheckbox'),
            charsNumbersCheckbox: document.getElementById('charsNumbersCheckbox'),
            charsSpecialCheckbox: document.getElementById('charsSpecialCheckbox'),
            
            // Hash
            hashTypeSelector: document.getElementById('hashTypeSelector'),
            hashInput: document.getElementById('hashInput'),
            hashUppercaseCheckbox: document.getElementById('hashUppercaseCheckbox'),
            
            // Random
            randomLengthSlider: document.getElementById('randomLengthSlider'),
            randomLengthValue: document.getElementById('randomLengthValue'),
            randomTypeSelector: document.getElementById('randomTypeSelector'),
            
            // Numeric
            numericLengthSlider: document.getElementById('numericLengthSlider'),
            numericLengthValue: document.getElementById('numericLengthValue'),
            numericMin: document.getElementById('numericMin'),
            numericMax: document.getElementById('numericMax'),
            
            // Custom
            customTemplate: document.getElementById('customTemplate'),
            
            // Batch
            batchCountSlider: document.getElementById('batchCountSlider'),
            batchCountValue: document.getElementById('batchCountValue'),
            
            // Buttons
            generateBtn: document.getElementById('generateBtn'),
            batchBtn: document.getElementById('batchBtn'),
            copyBtn: document.getElementById('copyBtn'),
            copyAllBtn: document.getElementById('copyAllBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            saveBtn: document.getElementById('saveBtn'),
            clearHistoryBtn: document.getElementById('clearHistoryBtn'),
            
            // Results
            resultPlaceholder: document.getElementById('resultPlaceholder'),
            mainResult: document.getElementById('mainResult'),
            resultsList: document.getElementById('resultsList'),
            resultsCount: document.getElementById('resultsCount'),
            
            // Info panel
            infoPanel: document.getElementById('infoPanel'),
            infoType: document.getElementById('infoType'),
            infoLength: document.getElementById('infoLength'),
            infoTime: document.getElementById('infoTime'),
            infoUnique: document.getElementById('infoUnique'),
            
            // History
            historyList: document.getElementById('historyList'),
            
            // Notification
            notification: document.getElementById('notification'),
            notificationText: document.getElementById('notificationText')
        };

        // Инициализация приложения
        function initApp() {
            setupEventListeners();
            updateSliders();
            loadHistory();
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            // Переключение типа генератора
            elements.typeButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    switchType(this.dataset.type);
                });
            });
            
            // UUID версия
            elements.uuidVersionSelector.addEventListener('click', function(e) {
                if (e.target.classList.contains('version-btn')) {
                    document.querySelectorAll('#uuidVersionSelector .version-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    uuidVersion = e.target.dataset.version;
                }
            });
            
            // Random тип
            elements.randomTypeSelector.addEventListener('click', function(e) {
                if (e.target.classList.contains('version-btn')) {
                    document.querySelectorAll('#randomTypeSelector .version-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    randomType = e.target.dataset.type;
                }
            });
            
            // Checkboxes
            const checkboxes = [
                elements.uppercaseCheckbox,
                elements.hyphensCheckbox,
                elements.charsLowerCheckbox,
                elements.charsUpperCheckbox,
                elements.charsNumbersCheckbox,
                elements.charsSpecialCheckbox,
                elements.hashUppercaseCheckbox
            ];
            
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('click', function() {
                    this.classList.toggle('checked');
                });
            });
            
            // Слайдеры
            const sliders = [
                elements.shortidLengthSlider,
                elements.randomLengthSlider,
                elements.numericLengthSlider,
                elements.batchCountSlider
            ];
            
            sliders.forEach(slider => {
                slider.addEventListener('input', updateSliders);
            });
            
            // Кнопки
            elements.generateBtn.addEventListener('click', generate);
            elements.batchBtn.addEventListener('click', generateBatch);
            elements.copyBtn.addEventListener('click', copyResult);
            elements.copyAllBtn.addEventListener('click', copyAllResults);
            elements.downloadBtn.addEventListener('click', downloadResults);
            elements.saveBtn.addEventListener('click', saveToHistory);
            elements.clearHistoryBtn.addEventListener('click', clearHistory);
        }

        // Обновление слайдеров
        function updateSliders() {
            elements.shortidLengthValue.textContent = elements.shortidLengthSlider.value;
            elements.randomLengthValue.textContent = elements.randomLengthSlider.value;
            elements.numericLengthValue.textContent = elements.numericLengthSlider.value;
            elements.batchCountValue.textContent = elements.batchCountSlider.value;
        }

        // Переключение типа
        function switchType(type) {
            currentType = type;
            
            // Обновить активную кнопку
            elements.typeButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.type === type) {
                    btn.classList.add('active');
                }
            });
            
            // Показать/скрыть соответствующие настройки
            const sections = [
                elements.uuidSettings,
                elements.shortidSettings,
                elements.hashSettings,
                elements.randomSettings,
                elements.numericSettings,
                elements.customSettings
            ];
            
            sections.forEach(section => {
                section.style.display = 'none';
            });
            
            switch(type) {
                case 'uuid':
                    elements.uuidSettings.style.display = 'block';
                    break;
                case 'shortid':
                    elements.shortidSettings.style.display = 'block';
                    break;
                case 'hash':
                    elements.hashSettings.style.display = 'block';
                    hashType = elements.hashTypeSelector.value;
                    break;
                case 'random':
                    elements.randomSettings.style.display = 'block';
                    break;
                case 'numeric':
                    elements.numericSettings.style.display = 'block';
                    break;
                case 'custom':
                    elements.customSettings.style.display = 'block';
                    break;
            }
            
            // Очистить результаты
            clearResults();
        }

        // Генерация ID
        function generate() {
            const count = parseInt(elements.batchCountSlider.value);
            generatedIDs = [];
            
            for (let i = 0; i < count; i++) {
                const id = generateID();
                if (id) {
                    generatedIDs.push(id);
                }
            }
            
            updateResultsDisplay();
            showNotification('ID успешно сгенерированы!');
        }

        // Генерация пакета
        function generateBatch() {
            const count = 10; // Фиксированное количество для пакета
            elements.batchCountSlider.value = count;
            elements.batchCountValue.textContent = count;
            
            generate();
        }

        // Генерация одного ID
        function generateID() {
            switch(currentType) {
                case 'uuid':
                    return generateUUID();
                case 'shortid':
                    return generateShortID();
                case 'hash':
                    return generateHash();
                case 'random':
                    return generateRandomString();
                case 'numeric':
                    return generateNumericID();
                case 'custom':
                    return generateCustomID();
                default:
                    return generateUUID();
            }
        }

        // Генерация UUID
        function generateUUID() {
            let uuid = '';
            
            switch(uuidVersion) {
                case 'v1':
                    // UUID v1 (временной)
                    uuid = generateTimeBasedUUID();
                    break;
                case 'v3':
                    // UUID v3 (MD5)
                    uuid = generateNamedUUID('md5');
                    break;
                case 'v5':
                    // UUID v5 (SHA-1)
                    uuid = generateNamedUUID('sha1');
                    break;
                case 'v4':
                default:
                    // UUID v4 (случайный) - стандартный
                    uuid = generateRandomUUID();
            }
            
            // Применить настройки
            if (elements.uppercaseCheckbox.classList.contains('checked')) {
                uuid = uuid.toUpperCase();
            }
            
            if (!elements.hyphensCheckbox.classList.contains('checked')) {
                uuid = uuid.replace(/-/g, '');
            }
            
            return uuid;
        }

        // Генерация случайного UUID v4
        function generateRandomUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Генерация временного UUID v1
        function generateTimeBasedUUID() {
            const timestamp = Date.now();
            const randomPart = Math.random().toString(16).substring(2, 10);
            return `${timestamp.toString(16).substring(0, 8)}-${timestamp.toString(16).substring(8, 12)}-4${timestamp.toString(16).substring(13, 16)}-${randomPart.substring(0, 4)}-${randomPart.substring(4)}`;
        }

        // Генерация именованного UUID (v3/v5)
        function generateNamedUUID(algorithm) {
            const namespace = '6ba7b810-9dad-11d1-80b4-00c04fd430c8';
            const name = 'example';
            let hash;
            
            // Простая имитация хэширования
            if (algorithm === 'md5') {
                hash = 'md5' + Math.random().toString(16).substring(2, 34);
            } else {
                hash = 'sha1' + Math.random().toString(16).substring(2, 42);
            }
            
            return `${hash.substring(0, 8)}-${hash.substring(8, 12)}-${hash.substring(12, 16)}-${hash.substring(16, 20)}-${hash.substring(20)}`;
        }

        // Генерация короткого ID
        function generateShortID() {
            const length = parseInt(elements.shortidLengthSlider.value);
            let chars = '';
            let result = '';
            
            // Добавить символы в зависимости от выбранных опций
            if (elements.charsLowerCheckbox.classList.contains('checked')) {
                chars += 'abcdefghijklmnopqrstuvwxyz';
            }
            if (elements.charsUpperCheckbox.classList.contains('checked')) {
                chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            }
            if (elements.charsNumbersCheckbox.classList.contains('checked')) {
                chars += '0123456789';
            }
            if (elements.charsSpecialCheckbox.classList.contains('checked')) {
                chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            }
            
            // Если не выбрано ни одного типа символов
            if (chars === '') {
                chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            }
            
            // Генерация ID
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            return result;
        }

        // Генерация хэша
        function generateHash() {
            const text = elements.hashInput.value || 'Hello World';
            const uppercase = elements.hashUppercaseCheckbox.classList.contains('checked');
            
            // Простая имитация хэширования (в реальном приложении нужно использовать crypto.subtle.digest)
            let hash = '';
            const hashLength = {
                'md5': 32,
                'sha1': 40,
                'sha256': 64,
                'sha512': 128
            }[hashType] || 32;
            
            // Генерация псевдо-хэша
            for (let i = 0; i < hashLength; i++) {
                hash += Math.floor(Math.random() * 16).toString(16);
            }
            
            if (uppercase) {
                hash = hash.toUpperCase();
            }
            
            return hash;
        }

        // Генерация случайной строки
        function generateRandomString() {
            const length = parseInt(elements.randomLengthSlider.value);
            let chars = '';
            let result = '';
            
            switch(randomType) {
                case 'alphanumeric':
                    chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    break;
                case 'letters':
                    chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
                    break;
                case 'numbers':
                    chars = '0123456789';
                    break;
                case 'hex':
                    chars = '0123456789ABCDEF';
                    break;
            }
            
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            return result;
        }

        // Генерация числового ID
        function generateNumericID() {
            const length = parseInt(elements.numericLengthSlider.value);
            const min = parseInt(elements.numericMin.value) || Math.pow(10, length - 1);
            const max = parseInt(elements.numericMax.value) || Math.pow(10, length) - 1;
            
            // Генерация случайного числа в диапазоне
            const number = Math.floor(Math.random() * (max - min + 1)) + min;
            return number.toString().padStart(length, '0');
        }

        // Генерация кастомного ID
        function generateCustomID() {
            let template = elements.customTemplate.value;
            if (!template) template = 'ID-{AAAA}-{####}-{DDMMYY}';
            
            const now = new Date();
            const replacements = {
                '{A}': () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.charAt(Math.floor(Math.random() * 26)),
                '{a}': () => 'abcdefghijklmnopqrstuvwxyz'.charAt(Math.floor(Math.random() * 26)),
                '{#}': () => Math.floor(Math.random() * 10),
                '{X}': () => {
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    return chars.charAt(Math.floor(Math.random() * chars.length));
                },
                '{YYYY}': () => now.getFullYear(),
                '{MM}': () => (now.getMonth() + 1).toString().padStart(2, '0'),
                '{DD}': () => now.getDate().toString().padStart(2, '0'),
                '{HH}': () => now.getHours().toString().padStart(2, '0'),
                '{mm}': () => now.getMinutes().toString().padStart(2, '0'),
                '{ss}': () => now.getSeconds().toString().padStart(2, '0')
            };
            
            // Замена шаблонов
            for (const [pattern, generator] of Object.entries(replacements)) {
                while (template.includes(pattern)) {
                    template = template.replace(pattern, generator());
                }
            }
            
            // Замена повторяющихся шаблонов (например, {AAAA})
            template = template.replace(/\{A+\}/g, match => {
                let result = '';
                for (let i = 0; i < match.length - 2; i++) {
                    result += replacements['{A}']();
                }
                return result;
            });
            
            template = template.replace(/\{a+\}/g, match => {
                let result = '';
                for (let i = 0; i < match.length - 2; i++) {
                    result += replacements['{a}']();
                }
                return result;
            });
            
            template = template.replace(/\{#+\}/g, match => {
                let result = '';
                for (let i = 0; i < match.length - 2; i++) {
                    result += replacements['{#}']();
                }
                return result;
            });
            
            template = template.replace(/\{X+\}/g, match => {
                let result = '';
                for (let i = 0; i < match.length - 2; i++) {
                    result += replacements['{X}']();
                }
                return result;
            });
            
            return template;
        }

        // Обновление отображения результатов
        function updateResultsDisplay() {
            if (generatedIDs.length === 0) {
                elements.resultPlaceholder.style.display = 'block';
                elements.mainResult.style.display = 'none';
                elements.resultsList.style.display = 'none';
                elements.infoPanel.style.display = 'none';
                return;
            }
            
            // Обновить главный результат
            if (generatedIDs.length === 1) {
                elements.resultPlaceholder.style.display = 'none';
                elements.mainResult.style.display = 'block';
                elements.mainResult.textContent = generatedIDs[0];
                elements.resultsList.style.display = 'none';
            } else {
                elements.resultPlaceholder.style.display = 'none';
                elements.mainResult.style.display = 'block';
                elements.mainResult.textContent = `${generatedIDs.length} ID сгенерировано`;
                elements.resultsList.style.display = 'block';
                
                // Обновить список
                updateResultsList();
            }
            
            // Обновить счетчик
            elements.resultsCount.textContent = `${generatedIDs.length} ID`;
            
            // Обновить информацию
            updateInfoPanel();
        }

        // Обновление списка результатов
        function updateResultsList() {
            elements.resultsList.innerHTML = '';
            
            generatedIDs.forEach((id, index) => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                
                resultItem.innerHTML = `
                    <div class="result-value">${id}</div>
                    <div class="result-actions">
                        <button class="action-btn copy-single-btn" data-index="${index}">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                `;
                
                elements.resultsList.appendChild(resultItem);
                
                // Обработчик копирования одного ID
                resultItem.querySelector('.copy-single-btn').addEventListener('click', function() {
                    copySingleID(this.dataset.index);
                });
            });
        }

        // Обновление информационной панели
        function updateInfoPanel() {
            if (generatedIDs.length === 0) return;
            
            const typeNames = {
                'uuid': 'UUID',
                'shortid': 'Короткий ID',
                'hash': 'Хэш',
                'random': 'Случайная строка',
                'numeric': 'Числовой ID',
                'custom': 'Кастомный ID'
            };
            
            elements.infoType.textContent = typeNames[currentType] || currentType;
            elements.infoLength.textContent = generatedIDs[0].length + ' симв.';
            elements.infoTime.textContent = new Date().toLocaleTimeString('ru-RU');
            
            // Проверить уникальность
            const uniqueSet = new Set(generatedIDs);
            const isUnique = uniqueSet.size === generatedIDs.length;
            elements.infoUnique.textContent = isUnique ? '100%' : `${Math.round((uniqueSet.size / generatedIDs.length) * 100)}%`;
            elements.infoUnique.style.color = isUnique ? 'var(--success)' : 'var(--warning)';
            
            elements.infoPanel.style.display = 'grid';
        }

        // Копирование результата
        function copyResult() {
            if (generatedIDs.length === 0) {
                showNotification('Нет данных для копирования', 'error');
                return;
            }
            
            let text = generatedIDs.length === 1 ? generatedIDs[0] : generatedIDs.join('\n');
            
            navigator.clipboard.writeText(text).then(() => {
                showNotification('ID скопирован!');
                
                const btn = elements.copyBtn;
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-check"></i> Скопировано';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Копирование всех результатов
        function copyAllResults() {
            if (generatedIDs.length === 0) {
                showNotification('Нет данных для копирования', 'error');
                return;
            }
            
            const text = generatedIDs.map((id, index) => `${index + 1}. ${id}`).join('\n');
            
            navigator.clipboard.writeText(text).then(() => {
                showNotification('Все ID скопированы!');
                
                const btn = elements.copyAllBtn;
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-check"></i> Скопировано';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Копирование одного ID
        function copySingleID(index) {
            if (!generatedIDs[index]) return;
            
            const id = generatedIDs[index];
            navigator.clipboard.writeText(id).then(() => {
                showNotification(`ID скопирован!`);
            });
        }

        // Скачивание результатов
        function downloadResults() {
            if (generatedIDs.length === 0) {
                showNotification('Нет данных для скачивания', 'error');
                return;
            }
            
            const typeNames = {
                'uuid': 'UUID',
                'shortid': 'ShortID',
                'hash': 'Hash',
                'random': 'Random',
                'numeric': 'Numeric',
                'custom': 'Custom'
            };
            
            const typeName = typeNames[currentType] || currentType;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const filename = `${typeName}_${timestamp}.txt`;
            
            const content = generatedIDs.map((id, index) => `${index + 1}. ${id}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('Результаты скачаны!');
        }

        // Сохранение в историю
        function saveToHistory() {
            if (generatedIDs.length === 0) {
                showNotification('Нет данных для сохранения', 'error');
                return;
            }
            
            const historyItem = {
                id: Date.now(),
                type: currentType,
                ids: generatedIDs.slice(0, 5), // Сохраняем только первые 5
                count: generatedIDs.length,
                timestamp: new Date().toISOString()
            };
            
            // Добавить в начало массива
            generationHistory.unshift(historyItem);
            
            // Ограничить историю 12 элементами
            if (generationHistory.length > 12) {
                generationHistory = generationHistory.slice(0, 12);
            }
            
            // Сохранить в localStorage
            localStorage.setItem('idgen_history', JSON.stringify(generationHistory));
            
            // Обновить отображение
            updateHistoryDisplay();
            
            showNotification('Результаты сохранены в историю!');
        }

        // Обновление отображения истории
        function updateHistoryDisplay() {
            elements.historyList.innerHTML = '';
            
            if (generationHistory.length === 0) {
                elements.historyList.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--gray);">
                        <i class="fas fa-history" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                        <h3>История пуста</h3>
                        <p>Сгенерируйте первые ID</p>
                    </div>
                `;
                return;
            }
            
            generationHistory.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.dataset.id = item.id;
                
                const typeNames = {
                    'uuid': 'UUID',
                    'shortid': 'Short ID',
                    'hash': 'Hash',
                    'random': 'Random',
                    'numeric': 'Numeric ID',
                    'custom': 'Custom ID'
                };
                
                const typeName = typeNames[item.type] || item.type;
                const firstID = item.ids[0] || '';
                const displayID = firstID.length > 30 ? firstID.substring(0, 27) + '...' : firstID;
                
                historyItem.innerHTML = `
                    <div class="history-type">${typeName}</div>
                    <div class="history-id">${displayID}</div>
                    <div class="history-time">
                        ${new Date(item.timestamp).toLocaleDateString('ru-RU')}
                        ${item.count > 1 ? ` • ${item.count} шт` : ''}
                    </div>
                `;
                
                historyItem.addEventListener('click', () => {
                    loadFromHistory(item.id);
                });
                
                elements.historyList.appendChild(historyItem);
            });
        }

        // Загрузка из истории
        function loadFromHistory(id) {
            const item = generationHistory.find(item => item.id == id);
            if (!item) return;
            
            // Переключить тип
            switchType(item.type);
            
            // Загрузить ID
            generatedIDs = item.ids;
            
            // Обновить отображение
            updateResultsDisplay();
            
            showNotification('Результаты загружены из истории!');
        }

        // Очистка результатов
        function clearResults() {
            generatedIDs = [];
            updateResultsDisplay();
        }

        // Очистка истории
        function clearHistory() {
            if (confirm('Вы уверены, что хотите очистить всю историю генераций?')) {
                generationHistory = [];
                localStorage.removeItem('idgen_history');
                updateHistoryDisplay();
                showNotification('История очищена');
            }
        }

        // Показать уведомление
        function showNotification(message, type = 'success') {
            elements.notificationText.textContent = message;
            elements.notification.className = `notification ${type}`;
            elements.notification.classList.add('show');
            
            setTimeout(() => {
                elements.notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
